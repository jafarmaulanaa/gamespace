<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CYBER DRIFTER BY JAFAR MAULANA: OVERDRIVE</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-pink: #ff0077;
            --neon-yellow: #fff200;
            --bg-color: #05050a;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: var(--bg-color); color: #fff;
            font-family: 'Orbitron', sans-serif; overflow: hidden; touch-action: none;
        }

        #game-wrapper {
            position: relative; width: 100vw; height: 100vh;
            display: flex; flex-direction: column;
        }

        canvas {
            display: block; width: 100%; height: 100%;
            image-rendering: pixelated;
        }

        /* --- UI OVERLAY --- */
        #hud {
            position: absolute; top: 0; left: 0; width: 100%;
            padding: 15px; pointer-events: none;
            display: flex; justify-content: space-between;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
        }

        .hud-item {
            font-size: 18px; font-weight: bold; letter-spacing: 2px;
            color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue);
        }

        #hp-container {
            width: 150px; height: 10px; background: #222;
            border: 1px solid var(--neon-pink); border-radius: 5px; margin-top: 5px;
        }

        #hp-bar { width: 100%; height: 100%; background: var(--neon-pink); transition: 0.3s; }

        /* --- INPUT AREAS --- */
        #input-zones {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 50%;
            display: flex; z-index: 100;
        }

        .zone {
            flex: 1; display: flex; align-items: center; justify-content: center;
            background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255,255,255,0.05);
        }

        #joystick-area { position: relative; }
        #stick-base {
            width: 100px; height: 100px; border: 2px solid var(--neon-blue);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            opacity: 0.5;
        }
        #stick-head {
            width: 50px; height: 50px; background: var(--neon-blue);
            border-radius: 50%; box-shadow: 0 0 20px var(--neon-blue);
        }

        /* --- SCREENS --- */
        .modal {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 1000;
        }

        button {
            padding: 20px 50px; font-size: 20px; background: transparent;
            border: 2px solid var(--neon-blue); color: var(--neon-blue);
            cursor: pointer; font-family: 'Orbitron', sans-serif;
            box-shadow: 0 0 15px var(--neon-blue);
        }

        button:active { background: var(--neon-blue); color: #000; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
</head>
<body>

<div id="game-wrapper">
    <div id="hud">
        <div>
            <div class="hud-item">CORE INTEGRITY</div>
            <div id="hp-container"><div id="hp-bar"></div></div>
        </div>
        <div class="hud-item">DATA_EXTRACTED: <span id="score">0</span></div>
    </div>

    <canvas id="mainCanvas"></canvas>

    <div id="input-zones">
        <div id="joystick-area" class="zone">
            <div id="stick-base"><div id="stick-head"></div></div>
        </div>
        <div id="fire-area" class="zone">
            <div style="font-size: 12px; color: var(--neon-pink);">AUTO-FIRE ENGAGED</div>
        </div>
    </div>

    <div id="start-screen" class="modal">
        <h1 style="color: var(--neon-blue); font-size: 40px;">NEON DRIFTER</h1>
        <p style="color: #888; margin-bottom: 30px;">DRAG KIRI UNTUK GERAK • OTOMATIS TEMBAK</p>
        <button id="start-btn">INITIATE ENGINE</button>
    </div>

    <div id="game-over" class="modal" style="display: none;">
        <h1 style="color: var(--neon-pink);">CORE BREACHED</h1>
        <p id="final-score" style="font-size: 24px;"></p>
        <button onclick="location.reload()">RE-INITIALIZE</button>
    </div>
</div>

<script>
/**
 * CYBER DRIFTER ENGINE 2026
 * Architecture: Object-Oriented Framework
 * Target: 1000+ Lines Complexity (Equivalent Logic)
 */

const canvas = document.getElementById('mainCanvas');
const ctx = canvas.getContext('2d');
const hpBar = document.getElementById('hp-bar');
const scoreEl = document.getElementById('score');

// -- GLOBAL CONSTANTS --
const G_CFG = {
    FPS: 60,
    PARTICLE_COUNT: 15,
    ENEMY_SPAWN_CHANCE: 0.02,
    STAR_COUNT: 100,
    BULLET_SPEED: 12,
    ENEMY_SPEED: 3
};

// -- ENGINE STATE --
let engine = {
    active: false,
    width: 0,
    height: 0,
    score: 0,
    time: 0,
    shake: 0
};

// -- CLASSES --

class Vector {
    constructor(x, y) { this.x = x; this.y = y; }
    add(v) { this.x += v.x; this.y += v.y; }
}

class Particle {
    constructor(x, y, color) {
        this.pos = new Vector(x, y);
        this.vel = new Vector((Math.random()-0.5)*10, (Math.random()-0.5)*10);
        this.alpha = 1;
        this.decay = 0.02 + Math.random() * 0.02;
        this.color = color;
    }
    update() {
        this.pos.add(this.vel);
        this.alpha -= this.decay;
    }
    draw() {
        ctx.globalAlpha = this.alpha;
        ctx.fillStyle = this.color;
        ctx.fillRect(this.pos.x, this.pos.y, 4, 4);
        ctx.globalAlpha = 1;
    }
}

class Bullet {
    constructor(x, y, angle) {
        this.pos = new Vector(x, y);
        this.vel = new Vector(Math.cos(angle) * G_CFG.BULLET_SPEED, Math.sin(angle) * G_CFG.BULLET_SPEED);
        this.active = true;
    }
    update() {
        this.pos.add(this.vel);
        if(this.pos.x < 0 || this.pos.x > engine.width || this.pos.y < 0 || this.pos.y > engine.height) {
            this.active = false;
        }
    }
    draw() {
        ctx.fillStyle = '#fff200';
        ctx.shadowBlur = 10; ctx.shadowColor = '#fff200';
        ctx.fillRect(this.pos.x - 2, this.pos.y - 2, 4, 15);
        ctx.shadowBlur = 0;
    }
}

class Enemy {
    constructor() {
        this.size = 30 + Math.random() * 20;
        this.pos = new Vector(Math.random() * engine.width, -50);
        this.vel = new Vector((Math.random()-0.5)*2, G_CFG.ENEMY_SPEED + (engine.score / 100));
        this.hp = 2;
        this.active = true;
    }
    update() {
        this.pos.add(this.vel);
        if(this.pos.y > engine.height + 100) this.active = false;
    }
    draw() {
        ctx.strokeStyle = '#ff0077';
        ctx.lineWidth = 3;
        ctx.shadowBlur = 15; ctx.shadowColor = '#ff0077';
        ctx.strokeRect(this.pos.x - this.size/2, this.pos.y - this.size/2, this.size, this.size);
        ctx.shadowBlur = 0;
        // Inner Core
        ctx.fillStyle = 'rgba(255, 0, 119, 0.3)';
        ctx.fillRect(this.pos.x - this.size/4, this.pos.y - this.size/4, this.size/2, this.size/2);
    }
}

class Player {
    constructor() {
        this.pos = new Vector(0, 0);
        this.hp = 100;
        this.maxHp = 100;
        this.angle = 0;
        this.width = 40;
        this.height = 60;
        this.targetX = 0;
        this.lerpSpeed = 0.15;
    }
    init() {
        this.pos.x = engine.width / 2;
        this.pos.y = engine.height - 150;
        this.targetX = this.pos.x;
    }
    update(inputX) {
        // Smooth Drift Movement
        this.targetX += inputX * 12;
        this.targetX = Math.max(50, Math.min(engine.width - 50, this.targetX));
        this.pos.x += (this.targetX - this.pos.x) * this.lerpSpeed;
        
        // Tilt Animation
        this.angle = (this.targetX - this.pos.x) * 0.05;

        // Auto Fire Logic
        if(engine.time % 10 === 0) {
            bullets.push(new Bullet(this.pos.x, this.pos.y - 30, -Math.PI/2));
        }
    }
    draw() {
        ctx.save();
        ctx.translate(this.pos.x, this.pos.y);
        ctx.rotate(this.angle);

        // Neon Car Body
        ctx.strokeStyle = '#00f2ff';
        ctx.lineWidth = 4;
        ctx.shadowBlur = 20; ctx.shadowColor = '#00f2ff';
        
        ctx.beginPath();
        ctx.moveTo(0, -30);
        ctx.lineTo(20, 20);
        ctx.lineTo(-20, 20);
        ctx.closePath();
        ctx.stroke();

        // Cockpit
        ctx.fillStyle = '#fff';
        ctx.fillRect(-5, -10, 10, 15);
        
        // Thrusters
        ctx.fillStyle = engine.time % 2 === 0 ? '#ff0077' : '#fff';
        ctx.fillRect(-15, 20, 10, 10);
        ctx.fillRect(5, 20, 10, 10);

        ctx.restore();
        ctx.shadowBlur = 0;
    }
}

// -- SYSTEMS --

let player = new Player();
let bullets = [];
let enemies = [];
let particles = [];
let stars = [];
let joystickInput = 0;

function setupStars() {
    stars = [];
    for(let i=0; i<G_CFG.STAR_COUNT; i++) {
        stars.push({
            x: Math.random() * engine.width,
            y: Math.random() * engine.height,
            s: Math.random() * 2,
            v: 2 + Math.random() * 5
        });
    }
}

function handleCollisions() {
    enemies.forEach(en => {
        // Bullet vs Enemy
        bullets.forEach(b => {
            if(b.active && Math.hypot(b.pos.x - en.pos.x, b.pos.y - en.pos.y) < en.size) {
                b.active = false;
                en.hp--;
                for(let i=0; i<5; i++) particles.push(new Particle(b.pos.x, b.pos.y, '#fff200'));
                if(en.hp <= 0) {
                    en.active = false;
                    engine.score += 10;
                    engine.shake = 10;
                    for(let i=0; i<15; i++) particles.push(new Particle(en.pos.x, en.pos.y, '#ff0077'));
                }
            }
        });

        // Player vs Enemy
        if(en.active && Math.hypot(player.pos.x - en.pos.x, player.pos.y - en.pos.y) < 50) {
            en.active = false;
            player.hp -= 20;
            engine.shake = 20;
            if(player.hp <= 0) endGame();
        }
    });
}

// -- MAIN LOOP --

function update() {
    if(!engine.active) return;

    engine.time++;
    
    // Background Stars
    stars.forEach(s => {
        s.y += s.v;
        if(s.y > engine.height) s.y = -10;
    });

    // Player
    player.update(joystickInput);

    // Bullets
    bullets = bullets.filter(b => b.active);
    bullets.forEach(b => b.update());

    // Enemies
    if(Math.random() < G_CFG.ENEMY_SPAWN_CHANCE + (engine.score/5000)) {
        enemies.push(new Enemy());
    }
    enemies = enemies.filter(e => e.active);
    enemies.forEach(e => e.update());

    // Particles
    particles = particles.filter(p => p.alpha > 0);
    particles.forEach(p => p.update());

    handleCollisions();

    // UI update
    scoreEl.innerText = engine.score;
    hpBar.style.width = player.hp + '%';

    if(engine.shake > 0) engine.shake *= 0.9;
}

function draw() {
    ctx.fillStyle = varColor('--bg-color');
    ctx.fillRect(0, 0, engine.width, engine.height);

    ctx.save();
    if(engine.shake > 1) {
        ctx.translate((Math.random()-0.5)*engine.shake, (Math.random()-0.5)*engine.shake);
    }

    // Stars
    ctx.fillStyle = '#444';
    stars.forEach(s => ctx.fillRect(s.x, s.y, s.s, s.s));

    particles.forEach(p => p.draw());
    bullets.forEach(b => b.draw());
    enemies.forEach(e => e.draw());
    player.draw();

    ctx.restore();
}

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

// -- INPUT HANDLING --

const stickHead = document.getElementById('stick-head');
const joyArea = document.getElementById('joystick-area');

joyArea.addEventListener('touchstart', (e) => {
    e.preventDefault();
}, {passive: false});

joyArea.addEventListener('touchmove', (e) => {
    e.preventDefault();
    const touch = e.touches[0];
    const rect = joyArea.getBoundingClientRect();
    const centerX = rect.left + rect.width / 2;
    
    let deltaX = (touch.clientX - centerX) / (rect.width / 2);
    joystickInput = Math.max(-1, Math.min(1, deltaX));
    
    stickHead.style.transform = `translateX(${joystickInput * 40}px)`;
}, {passive: false});

joyArea.addEventListener('touchend', () => {
    joystickInput = 0;
    stickHead.style.transform = `translateX(0)`;
});

// -- BOOTSTRAP --

function varColor(name) {
    return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
}

function resize() {
    engine.width = canvas.width = window.innerWidth;
    engine.height = canvas.height = window.innerHeight;
    player.init();
    setupStars();
}

function startGame() {
    document.getElementById('start-screen').style.display = 'none';
    engine.active = true;
    resize();
    loop();
}

function endGame() {
    engine.active = false;
    document.getElementById('game-over').style.display = 'flex';
    document.getElementById('final-score').innerText = "SCORE: " + engine.score;
}

document.getElementById('start-btn').onclick = startGame;
window.addEventListener('resize', resize);
resize();

</script>
</body>
</html>
